<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль | МПР Аналитика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 font-sans flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
        <h1 class="text-2xl font-bold text-slate-800 mb-1">Новый пароль</h1>
        <p class="text-sm text-slate-500 mb-5">Введите новый пароль для аккаунта.</p>

        {% if error %}
            <div class="mb-4 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3">{{ error }}</div>
        {% endif %}
        {% if message %}
            <div class="mb-4 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm px-4 py-3">{{ message }}</div>
        {% endif %}

        <form method="post" action="/auth/reset" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label class="text-sm text-slate-600 block mb-1">Новый пароль</label>
                <input name="password" type="password" required minlength="8" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:ring-2 focus:ring-blue-200 focus:border-blue-400 outline-none">
            </div>
            <div>
                <label class="text-sm text-slate-600 block mb-1">Повторите пароль</label>
                <input name="password_repeat" type="password" required minlength="8" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:ring-2 focus:ring-blue-200 focus:border-blue-400 outline-none">
            </div>
            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2.5 font-medium">Сохранить пароль</button>
            <a href="/auth/" class="block text-center text-sm text-blue-600 hover:text-blue-700">Вернуться к входу</a>
        </form>
    </div>
</body>
</html>

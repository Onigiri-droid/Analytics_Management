<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}МПР Аналитика{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Golos Text', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Golos Text', sans-serif; }
        .nav-active { background-color: #3b82f6 !important; color: #fff !important; }
        .nav-active svg { color: #fff !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-100 min-h-screen flex">

    <!-- ═══════════════════════════════════ SIDEBAR ═══════════════════════ -->
    <aside id="sidebar"
           class="fixed inset-y-0 left-0 z-40 w-56 bg-white border-r border-slate-200
                  flex flex-col -translate-x-full transition-transform duration-200
                  lg:static lg:translate-x-0 lg:flex-shrink-0">

        <div class="flex items-center gap-3 px-5 py-4 border-b border-slate-100">
            <div class="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"
                 style="background:linear-gradient(135deg,#3b82f6,#6366f1)">
                <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
            </div>
            <span class="font-bold text-slate-800 text-sm leading-tight">МПР<br>Аналитика</span>
        </div>

        <nav class="flex-1 p-2 space-y-0.5">
            <a href="/dashboard/"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium text-sm
                      hover:bg-slate-100 hover:text-slate-800 transition-colors
                      {% if active_page == 'dashboard' %}nav-active{% endif %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zm10-3a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1v-7z"/>
                </svg>
                Dashboard
            </a>
            <a href="/upload/"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium text-sm
                      hover:bg-slate-100 hover:text-slate-800 transition-colors
                      {% if active_page == 'upload' %}nav-active{% endif %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                Загрузка отчёта
            </a>
            <a href="/analytics/"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium text-sm
                      hover:bg-slate-100 hover:text-slate-800 transition-colors
                      {% if active_page == 'analytics' %}nav-active{% endif %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M20 7l-8 4-8-4m0 2l8 4 8-4M4 7v10l8 4 8-4V7"/>
                </svg>
                Остатки
            </a>
            <a href="/orders/"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium text-sm
                      hover:bg-slate-100 hover:text-slate-800 transition-colors
                      {% if active_page == 'orders' %}nav-active{% endif %}">
                <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 5h14
                             M17 18a1 1 0 100 2 1 1 0 000-2zM9 18a1 1 0 100 2 1 1 0 000-2z"/>
                </svg>
                Список заказа
            </a>
        </nav>
    </aside>

    <!-- Overlay для мобильного -->
    <div id="overlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden"
         onclick="closeSidebar()"></div>

    <!-- ═══════════════════════════════════ MAIN ══════════════════════════ -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

        <!-- Мобильная шапка -->
        <header class="lg:hidden sticky top-0 z-20 bg-white border-b border-slate-200
                        px-4 py-3 flex items-center gap-3">
            <button onclick="openSidebar()" class="text-slate-500 hover:text-slate-700">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <span class="font-bold text-slate-800 text-sm">МПР Аналитика</span>
        </header>

        <main class="flex-1 overflow-auto p-4 sm:p-6 lg:p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- ═══════════════════════════════════ TOAST ═════════════════════════ -->
    <div id="toast"
         class="fixed bottom-5 right-5 z-50 flex items-center gap-3 px-4 py-3
                rounded-xl bg-slate-800 text-white text-sm font-medium shadow-2xl
                translate-y-20 opacity-0 transition-all duration-300 pointer-events-none">
        <span id="toast-dot" class="w-2 h-2 rounded-full flex-shrink-0 bg-green-400"></span>
        <span id="toast-msg"></span>
    </div>

    <script>
        function openSidebar() {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('overlay').classList.remove('hidden');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('overlay').classList.add('hidden');
        }
        function showToast(msg, type) {
            const t   = document.getElementById('toast');
            const dot = document.getElementById('toast-dot');
            document.getElementById('toast-msg').textContent = msg;
            dot.className = 'w-2 h-2 rounded-full flex-shrink-0 ' +
                (type === 'error' ? 'bg-red-400' : 'bg-green-400');
            t.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none'), 3500);
        }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
